server:
  port: 8086

spring:
  application:
    name: agents
  mvc:
    async:
      request-timeout: -1

# Spring Boot Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    root: INFO
    "[com.example.springai.agents]": DEBUG
    "[org.springframework.ai]": INFO
