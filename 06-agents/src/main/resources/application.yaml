server:
  port: 8086

spring:
  application:
    name: agents
  mvc:
    async:
      request-timeout: -1
  # Microsoft Foundry configuration via spring-ai-starter-model-openai
  ai:
    openai:
      base-url: ${AZURE_OPENAI_ENDPOINT}
      api-key: ${AZURE_OPENAI_API_KEY}
      microsoft-deployment-name: ${AZURE_OPENAI_FAST_DEPLOYMENT}
      chat:
        model: ${AZURE_OPENAI_FAST_DEPLOYMENT}

# Spring Boot Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    root: INFO
    "[com.example.springai.agents]": DEBUG
    "[org.springframework.ai]": INFO
