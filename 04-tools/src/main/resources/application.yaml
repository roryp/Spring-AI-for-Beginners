spring:
  application:
    name: spring-ai-tools
  main:
    banner-mode: off
  web:
    error:
      include-message: always
      
      # Azure OpenAI configuration

server:
  port: 8084

# Spring Boot Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    "[com.example.springai]": DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
